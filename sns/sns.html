<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HGSNS</title>
<meta name="theme-color" content="#000000">
<link rel="icon" type="image/png" sizes="192x192" href="../icons/icon-192.png">
<link rel="apple-touch-icon" href="../icons/icon-192.png">
<link rel="stylesheet" href="sns.css">

<!-- ── バッジ定義（X風）── -->
<style>
/* ── USER BADGES ── */
.user-badge {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:17px; height:17px;
  border-radius:50%;
  flex-shrink:0;
  vertical-align:middle;
  margin-left:2px;
}
/* 管理者バッジ: 赤 */
.badge-admin {
  background:#e0245e;
  color:#fff;
  title:"管理者";
}
/* 開発者バッジ: 緑 */
.badge-dev {
  background:#17bf63;
  color:#fff;
  title:"開発者";
}
/* 公式バッジ: 青 */
.badge-official {
  background:#1d9bf0;
  color:#fff;
  title:"公式";
}
.user-badge svg {
  width:10px; height:10px;
}

/* プロフィールページ用大バッジ */
.badge-admin-lg, .badge-dev-lg, .badge-official-lg {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:22px; height:22px;
  border-radius:50%;
  flex-shrink:0;
  margin-left:4px;
  vertical-align:middle;
}
.badge-admin-lg  { background:#e0245e; color:#fff; }
.badge-dev-lg    { background:#17bf63; color:#fff; }
.badge-official-lg { background:#1d9bf0; color:#fff; }
.badge-admin-lg svg, .badge-dev-lg svg, .badge-official-lg svg {
  width:13px; height:13px;
}

/* 投稿内バッジラベル（ホバー時ツールチップ代わり） */
.user-badge[title]:hover::after {
  content: attr(title);
  position:absolute;
  bottom:calc(100% + 4px);
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.85);
  color:#fff;
  font-size:.7rem;
  padding:3px 8px;
  border-radius:4px;
  white-space:nowrap;
  pointer-events:none;
  z-index:999;
}
.user-badge { position:relative; }
</style>
</head>
<body>

<div class="sns-wrap">

  <!-- ── SIDEBAR ── -->
  <aside class="sns-sidebar">
    <div class="sns-sidebar-inner">

      <a href="../index.html" class="sidebar-logo">
        <span class="sidebar-logo-icon">🏠</span>
        <span class="sidebar-name" style="font-size:.95rem;color:var(--white2)">HGHome</span>
      </a>

      <nav class="sidebar-nav" id="mainNav">
        <!-- ホーム -->
        <button class="sidebar-nav-item active" data-view="home" onclick="setView('home');loadFeed()">
          <span class="sidebar-icon-wrap">
            <svg class="nav-icon-outline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H15v-6H9v6H4a1 1 0 01-1-1V9.5z"/></svg>
            <svg class="nav-icon-fill" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          </span>
          <span class="sidebar-label">ホーム</span>
        </button>
        <!-- 検索 -->
        <button class="sidebar-nav-item" data-view="search" onclick="setView('search');document.getElementById('searchInput')?.focus()">
          <span class="sidebar-icon-wrap">
            <svg class="nav-icon-outline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <svg class="nav-icon-fill" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          </span>
          <span class="sidebar-label">検索</span>
        </button>
        <!-- トレンド -->
        <button class="sidebar-nav-item" data-view="trend" onclick="setView('trend')">
          <span class="sidebar-icon-wrap">
            <svg class="nav-icon-outline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
            <svg class="nav-icon-fill" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6h-6z"/></svg>
          </span>
          <span class="sidebar-label">トレンド</span>
        </button>
        <!-- 通知 -->
        <button class="sidebar-nav-item" data-view="notifications" onclick="setView('notifications');loadNotifications()">
          <span class="sidebar-icon-wrap">
            <svg class="nav-icon-outline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <svg class="nav-icon-fill" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            <span class="sidebar-badge" id="notifBadge" style="display:none">0</span>
          </span>
          <span class="sidebar-label">通知</span>
        </button>
        <!-- ブックマーク -->
        <button class="sidebar-nav-item" data-view="bookmarks" onclick="if(session)setView('bookmarks');else openAuthModal('login')">
          <span class="sidebar-icon-wrap">
            <svg class="nav-icon-outline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
            <svg class="nav-icon-fill" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
          </span>
          <span class="sidebar-label">ブックマーク</span>
        </button>
        <!-- プロフィール -->
        <button class="sidebar-nav-item" data-view="profile" onclick="if(session)openProfile(session.username);else openAuthModal('login')">
          <span class="sidebar-icon-wrap" id="navProfileIconWrap">
            <svg class="nav-icon-outline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <svg class="nav-icon-fill" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            <!-- ログイン後はアバターcanvas -->
            <canvas id="navAvatarCanvas" width="26" height="26"
              style="border-radius:50%;display:none;border:2px solid var(--accent);"></canvas>
          </span>
          <span class="sidebar-label">プロフィール</span>
        </button>
        <!-- HGStudy（デスクトップのみ） -->
        <a class="sidebar-nav-item sidebar-nav-hgstudy" href="../study/study.html">
          <span class="sidebar-icon-wrap">
            <svg class="nav-icon-outline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
          </span>
          <span class="sidebar-label">HGStudy</span>
        </a>
      </nav>

      <button class="sidebar-post-btn" onclick="if(session)document.getElementById('composerText').focus();else openAuthModal('login')">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M23.6 3.94l-3.54-3.54a1.35 1.35 0 00-1.91 0L1.1 17.45l-.86 5.18a.68.68 0 00.78.78l5.18-.86L23.6 5.85a1.35 1.35 0 000-1.91zm-17.1 15.3l-3.8.63.63-3.8L17.1 2.29l3.17 3.17L6.5 19.24zm13.32-13.3l-3.17-3.17 1.63-1.63 3.17 3.17-1.63 1.63z"/></svg>
        <span class="btn-label">投稿する</span>
      </button>

      <div class="sidebar-sep"></div>

      <!-- ゲスト表示 -->
      <div id="sidebarGuest" style="display:none;flex-direction:column;gap:6px;padding:4px 0;">
        <button class="btn btn-primary" style="width:100%;border-radius:var(--r-xl)" onclick="openAuthModal('login')">ログイン</button>
        <button class="btn btn-ghost" style="width:100%;border-radius:var(--r-xl)" onclick="openAuthModal('reg')">アカウント作成</button>
      </div>

      <!-- ログイン済み表示 -->
      <div id="sidebarAuth" style="display:none">
        <button class="sidebar-profile" onclick="openProfile(session.username)">
          <canvas id="sidebarAvatarCanvas" class="sidebar-avatar" width="40" height="40"></canvas>
          <div class="sidebar-name">
            <div class="sidebar-dispname" id="sidebarDispname"></div>
            <div class="sidebar-username" id="sidebarUname"></div>
          </div>
          <span class="sidebar-dots">···</span>
        </button>
        <button class="back-home-btn sidebar-logout-btn" onclick="doLogout()" style="margin-top:4px;color:var(--white3)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span class="sidebar-logout-text">ログアウト</span>
        </button>
      </div>

    </div>
  </aside>

  <!-- ── FEED ── -->
  <main class="sns-feed">
    <div class="feed-header">
      <!-- ホーム用タブ（おすすめ / フォロー中） -->
      <div class="feed-tabs" id="homeFeedTabs">
        <!-- モバイル用ロゴ（中央）→ CSSで desktop非表示 -->
        <div class="mobile-header-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="var(--accent)" width="22" height="22"><path d="M23.954 4.569a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.691 8.094 4.066 6.13 1.64 3.161a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.061a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.937 4.937 0 004.604 3.417 9.868 9.868 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.054 0 13.999-7.496 13.999-13.986 0-.209 0-.42-.015-.63a9.936 9.936 0 002.46-2.548l-.047-.02z"/></svg>
        </div>
        <button class="feed-tab active" id="feedTabRec"    onclick="switchFeedTab('rec')">おすすめ</button>
        <button class="feed-tab"        id="feedTabFollow" onclick="switchFeedTab('follow')">フォロー中</button>
      </div>
      <!-- サブページ用タイトルバー -->
      <div class="feed-title-bar" id="feedTitleBar" style="display:none">
        <button class="feed-back-btn" onclick="goBack()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </button>
        <span id="feedTitleText"></span>
      </div>
    </div>

    <!-- Desktop Composer -->
    <div class="feed-composer" id="feedComposer" style="display:none">
      <canvas id="composerAvatarCanvas" class="composer-avatar" width="44" height="44"
        onclick="if(session)openProfile(session.username)"></canvas>
      <div class="composer-body">
        <div class="composer-reply-to" id="composerReplyBanner" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <span>返信先: <span class="reply-to-name" id="composerReplyName"></span></span>
          <button class="composer-reply-to-close" onclick="clearReplyContext()">✕</button>
        </div>
        <textarea
          class="composer-textarea"
          id="composerText"
          placeholder="いまどうしてる？"
          maxlength="280"
          oninput="updateComposerCount()"
          onkeydown="if((event.ctrlKey||event.metaKey)&&event.key==='Enter')submitPost()"
        ></textarea>
        <div class="composer-img-preview" id="composerImgPreview">
          <img id="composerImgPreviewImg" src="" alt="">
          <button class="composer-img-del" onclick="clearPostImage()">✕</button>
        </div>
        <div class="composer-toolbar">
          <div class="composer-tools">
            <button class="composer-tool-btn" title="画像を追加" onclick="document.getElementById('postImgInput').click()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
            <input type="file" id="postImgInput" class="img-input" accept="image/*" onchange="handlePostImgSelect(event)">
          </div>
          <div class="composer-right">
            <!-- 文字数リング -->
            <svg class="char-ring" id="composerRing" viewBox="0 0 32 32" width="28" height="28">
              <circle class="char-ring-bg" cx="16" cy="16" r="12" fill="none" stroke-width="3"/>
              <circle class="char-ring-fill" id="composerRingFill" cx="16" cy="16" r="12" fill="none" stroke-width="3"
                stroke-dasharray="75.4" stroke-dashoffset="75.4" transform="rotate(-90 16 16)"/>
            </svg>
            <span class="composer-count" id="composerCount" style="display:none">0</span>
            <div class="composer-divider"></div>
            <button class="composer-submit" id="composerSubmitBtn" onclick="submitPost()" disabled>投稿</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── VIEW: ホーム ── -->
    <div id="homeView">
      <div id="feedPosts"></div>
    </div>

    <!-- ── VIEW: プロフィール ── -->
    <div id="profileViewWrap" style="display:none">
      <div id="profileView"></div>
    </div>

    <!-- ── VIEW: 検索 ── -->
    <div id="searchViewWrap" style="display:none">
      <div style="padding:12px 16px;border-bottom:1px solid var(--line);">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="searchInput"
            placeholder="ユーザーまたは#タグを検索"
            onkeydown="if(event.key==='Enter')doSearch()"
            oninput="onSearchInput(event)">
          <button class="search-clear-btn" id="searchClearBtn" onclick="clearSearch()" style="display:none">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
      </div>
      <!-- 検索タブ -->
      <div class="search-tabs" id="searchTabs" style="display:none">
        <button class="feed-tab active" id="sTabUsers" onclick="switchSearchTab('users')">ユーザー</button>
        <button class="feed-tab"        id="sTabPosts" onclick="switchSearchTab('posts')">投稿</button>
        <button class="feed-tab"        id="sTabTags"  onclick="switchSearchTab('tags')">タグ</button>
      </div>
      <div id="searchView">
        <div class="feed-empty"><span class="feed-empty-icon">🔍</span>キーワードを入力してください</div>
      </div>
    </div>

    <!-- ── VIEW: トレンド ── -->
    <div id="trendViewWrap" style="display:none">
      <div id="trendView"></div>
    </div>

    <!-- ── VIEW: ハッシュタグ ── -->
    <div id="hashtagViewWrap" style="display:none">
      <div id="hashtagView"></div>
    </div>

    <!-- ── VIEW: スレッド / 投稿詳細 ── -->
    <div id="threadViewWrap" style="display:none">
      <div id="threadView"></div>
    </div>

    <!-- ── VIEW: 通知 ── -->
    <div id="notificationsViewWrap" style="display:none">
      <div id="notificationsView"></div>
    </div>

    <!-- ── VIEW: ブックマーク ── -->
    <div id="bookmarksViewWrap" style="display:none">
      <div id="bookmarksView"></div>
    </div>

  </main>

  <!-- ── RIGHT PANEL ── -->
  <aside class="sns-right">
    <div class="right-search">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" id="rightSearchInput"
          placeholder="HGSNS を検索"
          onkeydown="if(event.key==='Enter'){copySearchAndGo(this.value);}"
          oninput="onRightSearchInput(this)">
      </div>
    </div>

    <!-- トレンド -->
    <div class="right-card">
      <div class="right-card-head">🔥 いまトレンド</div>
      <div id="rightTrends"></div>
      <div class="right-card-foot" onclick="setView('trend')">すべて見る →</div>
    </div>

    <!-- おすすめユーザー -->
    <div class="right-card">
      <div class="right-card-head">おすすめユーザー</div>
      <div id="suggestUsers"></div>
      <div class="right-card-foot" onclick="setView('search')">もっと見る →</div>
    </div>

    <!-- HGHome リンク -->
    <div class="right-card">
      <div class="right-card-head">🏠 HGHome</div>
      <div style="padding:12px 16px;">
        <a href="../index.html" class="back-home-btn" style="padding:8px 0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          HGHome に戻る
        </a>
        <a href="../study/study.html" class="back-home-btn" style="padding:8px 0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
          HGStudy を開く
        </a>
      </div>
    </div>

    <div style="padding:8px 0;font-size:.75rem;color:var(--white3);line-height:1.8">
      <a href="../index.html" style="color:var(--white3);text-decoration:none;margin-right:12px">HGHome</a>
      <a href="../study/study.html" style="color:var(--white3);text-decoration:none">HGStudy</a>
      <br>© HGHome · HGSNS
    </div>
  </aside>

</div><!-- /sns-wrap -->

<!-- ── Mobile FAB ── -->
<button class="mobile-fab" id="mobileFab" onclick="if(session)openMobileCompose();else openAuthModal('login')" aria-label="新しい投稿">
  <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M23.6 3.94l-3.54-3.54a1.35 1.35 0 00-1.91 0L1.1 17.45l-.86 5.18a.68.68 0 00.78.78l5.18-.86L23.6 5.85a1.35 1.35 0 000-1.91zm-17.1 15.3l-3.8.63.63-3.8L17.1 2.29l3.17 3.17L6.5 19.24zm13.32-13.3l-3.17-3.17 1.63-1.63 3.17 3.17-1.63 1.63z"/></svg>
</button>

<!-- ── TOAST ── -->
<div class="toast" id="snsToast"></div>

<!-- ── MOBILE COMPOSE (X風・全画面) ── -->
<div class="mobile-compose-overlay" id="mobileComposeOverlay">
  <div class="mobile-compose-sheet">
    <!-- ヘッダー: キャンセル | タイトル | 投稿 -->
    <div class="sheet-header">
      <button class="sheet-cancel-btn" onclick="closeMobileCompose()">キャンセル</button>
      <span class="sheet-title" id="sheetTitle">新しいポスト</span>
      <button class="composer-submit sheet-post-btn" id="sheetSubmitBtn" onclick="submitSheetPost()" disabled>投稿</button>
    </div>
    <!-- 返信バナー -->
    <div class="sheet-reply-to" id="sheetReplyBanner" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      返信先: <span class="reply-name" id="sheetReplyName"></span>
    </div>
    <!-- 入力エリア -->
    <div class="sheet-compose-row">
      <canvas id="sheetAvatarCanvas" width="40" height="40"
        style="border-radius:50%;border:2px solid var(--accent);flex-shrink:0;margin-top:2px;"></canvas>
      <div style="flex:1;min-width:0;">
        <textarea class="sheet-textarea" id="sheetTextarea"
          placeholder="いまどうしてる？" maxlength="280"
          oninput="updateSheetCount()"></textarea>
        <div id="sheetQuotePreview" style="display:none"></div>
        <div class="composer-img-preview" id="sheetImgPreview">
          <img id="sheetImgPreviewImg" src="" alt="">
          <button class="composer-img-del" onclick="clearSheetImage()">✕</button>
        </div>
      </div>
    </div>
    <!-- ツールバー -->
    <div class="sheet-toolbar">
      <div class="sheet-tools">
        <button class="composer-tool-btn" onclick="document.getElementById('sheetImgInput').click()" title="画像">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
        <input type="file" id="sheetImgInput" class="img-input" accept="image/*" onchange="handleSheetImgSelect(event)">
      </div>
      <!-- 文字数リング -->
      <div style="display:flex;align-items:center;gap:10px;">
        <svg class="char-ring" id="sheetRing" viewBox="0 0 32 32" width="24" height="24">
          <circle class="char-ring-bg" cx="16" cy="16" r="12" fill="none" stroke-width="3"/>
          <circle class="char-ring-fill" id="sheetRingFill" cx="16" cy="16" r="12" fill="none" stroke-width="3"
            stroke-dasharray="75.4" stroke-dashoffset="75.4" transform="rotate(-90 16 16)"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<!-- ── REPLY MODAL (desktop) ── -->
<div class="overlay" id="replyOverlay" onclick="if(event.target===this)closeReplyModal()">
  <div class="modal">
    <div class="modal-head">
      <h3 class="modal-title">返信</h3>
      <button class="modal-close" onclick="closeReplyModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="reply-modal-context" id="replyModalContext"></div>
      <div class="reply-modal-compose">
        <canvas id="replyAvatarCanvas" width="40" height="40"
          style="border-radius:50%;border:2px solid var(--accent);flex-shrink:0;"></canvas>
        <div class="reply-compose-body">
          <textarea class="reply-compose-textarea" id="replyTextarea"
            placeholder="返信を入力..."
            maxlength="280"
            oninput="updateReplyCount()"
            onkeydown="if((event.ctrlKey||event.metaKey)&&event.key==='Enter')submitReply()">
          </textarea>
          <div class="reply-compose-toolbar">
            <div style="display:flex;gap:4px;">
              <button class="composer-tool-btn" onclick="document.getElementById('replyImgInput').click()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              </button>
              <input type="file" id="replyImgInput" class="img-input" accept="image/*" onchange="handleReplyImgSelect(event)">
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
              <span class="composer-count" id="replyCount">280</span>
              <button class="composer-submit" id="replySubmitBtn" onclick="submitReply()" disabled>返信</button>
            </div>
          </div>
          <div class="composer-img-preview" id="replyImgPreview">
            <img id="replyImgPreviewImg" src="" alt="">
            <button class="composer-img-del" onclick="clearReplyImage()">✕</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── REPOST OPTIONS MODAL ── -->
<div class="overlay" id="repostOverlay" onclick="if(event.target===this)closeRepostModal()">
  <div class="modal" style="max-width:360px">
    <div class="modal-head">
      <h3 class="modal-title">リポスト</h3>
      <button class="modal-close" onclick="closeRepostModal()">✕</button>
    </div>
    <div class="modal-body" style="padding:8px 12px;">
      <div class="repost-options">
        <button class="repost-option" onclick="doRepost()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
          リポスト
        </button>
        <button class="repost-option" onclick="openQuoteRepost()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          引用リポスト
        </button>
        <button class="repost-option" id="undoRepostBtn" style="display:none" onclick="doUndoRepost()">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--like)" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
          <span style="color:var(--like)">リポストを取り消す</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── QUOTE REPOST MODAL ── -->
<div class="overlay" id="quoteOverlay" onclick="if(event.target===this)closeQuoteModal()">
  <div class="modal">
    <div class="modal-head">
      <h3 class="modal-title">引用リポスト</h3>
      <button class="modal-close" onclick="closeQuoteModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="reply-modal-compose" style="margin-bottom:12px;">
        <canvas id="quoteAvatarCanvas" width="40" height="40"
          style="border-radius:50%;border:2px solid var(--accent);flex-shrink:0;"></canvas>
        <div class="reply-compose-body">
          <textarea class="reply-compose-textarea" id="quoteTextarea"
            placeholder="コメントを追加..."
            maxlength="280"
            oninput="updateQuoteCount()"
            onkeydown="if((event.ctrlKey||event.metaKey)&&event.key==='Enter')submitQuoteRepost()">
          </textarea>
          <div class="reply-compose-toolbar">
            <div></div>
            <div style="display:flex;align-items:center;gap:12px;">
              <span class="composer-count" id="quoteCount">280</span>
              <button class="composer-submit" id="quoteSubmitBtn" onclick="submitQuoteRepost()">引用する</button>
            </div>
          </div>
        </div>
      </div>
      <div class="post-quote-embed" id="quotePreviewEmbed"></div>
    </div>
  </div>
</div>

<!-- ── AUTH MODAL ── -->
<div class="overlay" id="authOverlay" onclick="if(event.target===this&&session)closeAuthModal()">
  <div class="modal">
    <div class="modal-head">
      <h3 class="modal-title">HGSNS にサインイン</h3>
      <button class="modal-close" onclick="if(session)closeAuthModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="auth-tabs">
        <button class="auth-tab on" id="authTabLogin" onclick="switchAuthTab('login')">ログイン</button>
        <button class="auth-tab"    id="authTabReg"   onclick="switchAuthTab('reg')">アカウント作成</button>
      </div>
      <div class="form-err" id="authErr"></div>
      <div class="form-group">
        <label class="form-label">ユーザー名</label>
        <input class="form-input" id="authUser" type="text"
          placeholder="英数字・アンダースコア"
          autocomplete="username"
          onkeydown="if(event.key==='Enter')authSubmit()">
      </div>
      <div class="form-group">
        <label class="form-label">パスワード</label>
        <div class="pass-wrap">
          <input class="form-input" id="authPass" type="password"
            autocomplete="current-password"
            onkeydown="if(event.key==='Enter')authSubmit()">
          <button class="pass-toggle" type="button" onclick="togglePassVis('authPass',this)" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div id="authRegExtra" style="display:none">
        <div class="form-group">
          <label class="form-label">パスワード確認</label>
          <input class="form-input" id="authPassConfirm" type="password"
            onkeydown="if(event.key==='Enter')authSubmit()">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="authSubmitBtn" onclick="authSubmit()" style="width:100%">ログイン</button>
    </div>
  </div>
</div>

<!-- ── EDIT PROFILE MODAL ── -->
<div class="overlay" id="editProfileOverlay" onclick="if(event.target===this)closeEditProfile()">
  <div class="modal">
    <div class="modal-head">
      <h3 class="modal-title">プロフィールを編集</h3>
      <button class="modal-close" onclick="closeEditProfile()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-err" id="editProfileErr"></div>
      <div class="form-group">
        <label class="form-label">表示名</label>
        <input class="form-input" id="editDispName" type="text" maxlength="30" placeholder="表示名">
      </div>
      <div class="form-group">
        <label class="form-label">自己紹介</label>
        <textarea class="form-textarea" id="editBio" maxlength="160"
          placeholder="自己紹介（160文字以内）"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEditProfile()">キャンセル</button>
      <button class="btn btn-primary" id="editProfileSubmitBtn" onclick="submitEditProfile()">保存する</button>
    </div>
  </div>
</div>

<!-- ── FOLLOW LIST MODAL ── -->
<div class="overlay" id="followListOverlay" onclick="if(event.target===this)closeFollowList()">
  <div class="modal" style="max-width:400px">
    <div class="modal-head">
      <h3 class="modal-title" id="followListTitle">フォロー中</h3>
      <button class="modal-close" onclick="closeFollowList()">✕</button>
    </div>
    <div class="modal-body" style="padding:0;max-height:420px;overflow-y:auto" id="followListBody"></div>
  </div>
</div>

<!-- ── IMAGE LIGHTBOX ── -->
<div class="img-lightbox" id="imgLightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="sns.js"></script>
</body>
</html>

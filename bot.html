<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HGHomeBot+</title>
  <meta name="description" content="HGHomeBot+ — 公式コマンドリファレンス・更新履歴">
  <meta name="theme-color" content="#ffe600">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HGBot+">
  <link rel="stylesheet" href="bot.css">
  <style>
    .nav-inner { display:flex; align-items:center; justify-content:space-between; width:100%; }
    .nav-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:0.06em; color:var(--text); transition:color var(--t); }
    .theme-btn { background:none; border:1px solid var(--border); color:var(--text); width:36px; height:36px; cursor:pointer; font-size:15px; transition:border-color var(--t),color var(--t); }
    .theme-btn:hover { border-color:var(--yellow); }
    .section-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(32px,6vw,56px); color:var(--text); letter-spacing:0.04em; line-height:1; transition:color var(--t); }
    .section-title .bracket { color:var(--yellow); }
    .updates-list { display:flex; flex-direction:column; gap:8px; }
    .update-version { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .update-title-text { flex:1; font-family:'IBM Plex Mono',monospace; font-size:14px; color:var(--text); letter-spacing:0.02em; transition:color var(--t); }
    .update-header:hover .update-title-text { color:var(--yellow); }
    .update-chevron { font-size:10px; color:var(--muted); transition:transform var(--t),color var(--t); flex-shrink:0; }
    .update-card.open .update-chevron { transform:rotate(180deg); color:var(--yellow); }
    .version-badge-new { font-family:'IBM Plex Mono',monospace; font-size:9px; font-weight:700; color:#050505; background:var(--pink); padding:2px 7px; letter-spacing:0.1em; text-transform:uppercase; }
    .update-section { margin-bottom:20px; }
    .update-section:last-child { margin-bottom:0; }
    .update-section-heading { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--cyan); letter-spacing:0.1em; margin-bottom:10px; padding-left:12px; border-left:2px solid var(--cyan); transition:color var(--t),border-color var(--t); }
    .update-items-list { list-style:none; display:flex; flex-direction:column; gap:5px; }
    .update-items-list li { font-size:13px; color:var(--text2); line-height:1.7; padding-left:20px; position:relative; font-family:'Noto Sans JP',sans-serif; transition:color var(--t); }
    .update-items-list li::before { content:"■"; color:var(--yellow); font-size:7px; position:absolute; left:4px; top:6px; }
    .commands-wrap { display:flex; flex-direction:column; gap:32px; }
    .cmd-cat-title { font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:var(--yellow); padding:4px 14px; border-left:3px solid var(--yellow); background:rgba(255,230,0,0.05); margin-bottom:14px; transition:color var(--t),border-color var(--t); }
    .cmd-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px; }
    .cmd-card { background:var(--surface); border:1px solid var(--border); padding:14px 16px; transition:border-color var(--t),transform var(--t),background var(--t); }
    .cmd-card:hover { border-color:rgba(255,230,0,0.45); transform:translateY(-2px); background:var(--surface2); }
    .cmd-code { display:block; font-family:'IBM Plex Mono',monospace; font-size:12.5px; font-weight:600; color:var(--yellow); margin-bottom:5px; }
    .cmd-desc { display:block; font-size:12px; color:var(--text2); line-height:1.6; transition:color var(--t); }
    .cmd-usage-hint { display:block; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-top:4px; transition:color var(--t); }
    .state-msg { color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:12px; padding:20px 0; }
    .error-msg { color:var(--pink); font-family:'IBM Plex Mono',monospace; font-size:12px; padding:20px 0; }
    .footer-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
    .footer-link { color:var(--cyan); text-decoration:none; font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.08em; transition:color var(--t); }
    .footer-link:hover { color:var(--yellow); }
    section { min-height:unset; padding:80px 60px 60px; }
    section.hero { padding-top:140px; padding-bottom:80px; min-height:unset; }
    @media(max-width:768px){ section { padding:60px 24px 48px; } section.hero { padding-top:100px; } }
  </style>
</head>
<body>
  <div class="bg-mesh">
    <div class="bg-static"></div>
    <div class="bg-orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
  </div>

  <nav>
    <div class="nav-inner">
      <a href="../hghome-official/index.html" class="nav-logo" style="color:var(--cyan)">← HGHome</a>
      <span class="nav-title">HGHomeBot<span style="color:var(--pink)">+</span></span>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="theme-btn" id="themeToggle" title="テーマ切替">🌙</button>
      </div>
    </div>
  </nav>

  <main>
    <section class="hero">
      <div class="hero-badge" id="heroBadge">
        <span class="hero-badge-dot"></span>Loading...
      </div>
      <h1 class="hero-title">HGHomeBot<span class="grad">+</span></h1>
      <p class="hero-sub">Discord Bot — コマンドリファレンス / 更新履歴</p>
    </section>

    <section id="updatesSection">
      <div class="section-header">
        <h2 class="section-title"><span class="bracket">[</span> 更新履歴 <span class="bracket">]</span></h2>
      </div>
      <div id="updatesList" class="updates-list">
        <p class="state-msg">Loading...</p>
      </div>
    </section>

    <section id="commandsSection">
      <div class="section-header">
        <h2 class="section-title"><span class="bracket">[</span> コマンド一覧 <span class="bracket">]</span></h2>
      </div>
      <div id="commandsList" class="commands-wrap">
        <p class="state-msg">Loading...</p>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-row">
      <span class="footer-copy">HGHomeBot+ &copy; HGHome</span>
      <a href="../hghome-official/index.html" class="footer-link">← HGHome Portal</a>
    </div>
  </footer>

  <script>
    // ── Theme ──────────────────────────────────────────────
    const themes = ['dark', 'light', 'glass'];
    const themeEmojis = ['🌙', '☀️', '🔮'];
    let themeIdx = parseInt(localStorage.getItem('hgbot_theme') || '0');
    const applyTheme = () => {
      document.documentElement.setAttribute('data-theme', themes[themeIdx]);
      document.getElementById('themeToggle').textContent = themeEmojis[themeIdx];
    };
    applyTheme();
    document.getElementById('themeToggle').addEventListener('click', () => {
      themeIdx = (themeIdx + 1) % themes.length;
      localStorage.setItem('hgbot_theme', themeIdx);
      applyTheme();
    });

    // ── PWA Dynamic Manifest ──────────────────────────────
    (function() {
      const c = document.createElement('canvas');
      c.width = c.height = 192;
      const x = c.getContext('2d');
      x.fillStyle = '#060608'; x.fillRect(0,0,192,192);
      x.fillStyle = '#ff2d6b'; x.font = 'bold 88px monospace';
      x.textAlign = 'center'; x.textBaseline = 'middle';
      x.fillText('B+', 96, 102);
      const manifest = {
        name:'HGHomeBot+', short_name:'HGBot+',
        start_url:'./bot.html', display:'standalone',
        background_color:'#060608', theme_color:'#ff2d6b',
        icons:[{src:c.toDataURL('image/png'),sizes:'192x192',type:'image/png'}]
      };
      const link = document.createElement('link');
      link.rel='manifest';
      link.href = URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'}));
      document.head.appendChild(link);
    })();

    // ── Load Data ─────────────────────────────────────────
    fetch('bot.json')
      .then(r => r.json())
      .then(data => {
        // Hero badge
        document.getElementById('heroBadge').innerHTML =
          `<span class="hero-badge-dot"></span>${data.meta?.hero_badge || data.meta?.latest_version || 'HGHomeBot+'}`;

        // Updates list
        const ul = document.getElementById('updatesList');
        ul.innerHTML = '';
        (data.updates || []).forEach(u => {
          const card = document.createElement('div');
          card.className = 'update-card' + (u.open ? ' open' : '');
          card.innerHTML = `
            <div class="update-header" onclick="this.parentElement.classList.toggle('open')">
              <div class="update-version">
                <span class="version-tag${u.badge === 'new' ? ' new' : ''}">${u.version}</span>
                ${u.badge && u.badge !== 'new' ? `<span class="version-badge-new">${u.badge}</span>` : ''}
              </div>
              <span class="update-title-text">${u.title}</span>
              <span class="update-chevron">▼</span>
            </div>
            <div class="update-body">
              ${(u.sections || []).map(s => `
                <div class="update-section">
                  ${s.heading ? `<h4 class="update-section-heading">${s.heading}</h4>` : ''}
                  <ul class="update-items-list">
                    ${(s.items || []).map(item => `<li>${item}</li>`).join('')}
                  </ul>
                </div>
              `).join('')}
            </div>
          `;
          ul.appendChild(card);
        });

        // Commands
        const cl = document.getElementById('commandsList');
        cl.innerHTML = '';
        if (!data.commands || data.commands.length === 0) {
          cl.innerHTML = '<p class="state-msg">コマンド一覧はbot.jsonのcommandsキーに追加できます</p>';
          return;
        }
        data.commands.forEach(cat => {
          const div = document.createElement('div');
          div.innerHTML = `
            <h3 class="cmd-cat-title">${cat.category}</h3>
            <div class="cmd-grid">
              ${(cat.items || []).map(cmd => `
                <div class="cmd-card">
                  <code class="cmd-code">${cmd.name}</code>
                  <span class="cmd-desc">${cmd.desc}</span>
                  ${cmd.usage ? `<span class="cmd-usage-hint">${cmd.usage}</span>` : ''}
                </div>
              `).join('')}
            </div>
          `;
          cl.appendChild(div);
        });
      })
      .catch(err => {
        document.getElementById('updatesList').innerHTML =
          `<p class="error-msg">データ読み込みエラー: ${err.message}</p>`;
      });
  </script>
</body>
</html>

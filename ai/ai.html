<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPOSE — 対話型マルコフAI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0c0e0b;
  --s1:      #131510;
  --s2:      #1a1d17;
  --border:  #252920;
  --border2: #2e3228;
  --green:   #a3e635;
  --green2:  #84cc16;
  --glow:    rgba(163,230,53,0.15);
  --glow2:   rgba(163,230,53,0.06);
  --amber:   #fbbf24;
  --cyan:    #67e8f9;
  --rose:    #fb7185;
  --text:    #d4d9cc;
  --mid:     #6b7263;
  --dim:     #353930;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:'Zen Kaku Gothic New',sans-serif;
  display:flex;flex-direction:column;height:100vh;
}

/* noise texture overlay */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size:200px 200px;opacity:.4;
}

/* ─── Header ─── */
header{
  position:relative;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 22px;
  border-bottom:1px solid var(--border);
  background:rgba(12,14,11,0.96);
  backdrop-filter:blur(20px);
  flex-shrink:0;
}
.brand{
  display:flex;align-items:center;gap:10px;
  font-family:'DM Mono',monospace;font-size:.88rem;
  font-weight:500;letter-spacing:.2em;color:var(--green);
}
.brand-orb{
  width:26px;height:26px;border-radius:50%;
  border:1.5px solid var(--green);
  display:grid;place-items:center;
  position:relative;
}
.brand-orb::after{
  content:'';width:8px;height:8px;
  background:var(--green);border-radius:50%;
  box-shadow:0 0 8px var(--green);
  animation:orb 2.5s ease-in-out infinite;
}
@keyframes orb{0%,100%{transform:scale(.7);opacity:.5}50%{transform:scale(1);opacity:1}}

.header-right{display:flex;align-items:center;gap:10px}
.hbadge{
  font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;
  padding:3px 8px;border:1px solid var(--border2);border-radius:3px;
  color:var(--mid);background:var(--s1);
}
.hbadge.ok{border-color:rgba(163,230,53,.25);color:var(--green)}
.hbadge.warn{border-color:rgba(251,191,36,.3);color:var(--amber)}
.hstat{
  font-family:'DM Mono',monospace;font-size:.58rem;
  color:var(--mid);display:flex;align-items:center;gap:5px;
}
.dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--green);animation:blink 2s ease-in-out infinite;
}
.dot.warn{background:var(--amber)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* ─── Chat area ─── */
#chat{
  flex:1;overflow-y:auto;
  padding:24px 0;position:relative;z-index:5;
  scroll-behavior:smooth;
}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-track{background:transparent}
#chat::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}

.msgs{
  max-width:740px;margin:0 auto;
  padding:0 20px;
  display:flex;flex-direction:column;gap:18px;
}

/* ─── Welcome ─── */
.welcome{
  padding:36px 0 20px;
  animation:fadeUp .6s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.welcome-inner{
  border:1px solid var(--border2);border-radius:12px;
  background:var(--s1);padding:24px 28px;
  position:relative;overflow:hidden;
}
.welcome-inner::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,rgba(163,230,53,.08) 0%,transparent 70%);
  pointer-events:none;
}
.welcome-title{
  font-family:'DM Mono',monospace;font-size:1.3rem;font-weight:500;
  color:var(--green);letter-spacing:.12em;margin-bottom:8px;
}
.welcome-sub{
  color:var(--mid);font-size:.85rem;line-height:1.8;margin-bottom:20px;
}
.welcome-sub code{
  font-family:'DM Mono',monospace;font-size:.8em;
  color:var(--cyan);background:rgba(103,232,249,.08);
  padding:1px 5px;border-radius:3px;
}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{
  font-family:'Zen Kaku Gothic New',sans-serif;font-size:.78rem;
  padding:6px 13px;border:1px solid var(--border2);border-radius:16px;
  background:var(--s2);color:var(--mid);cursor:pointer;
  transition:all .15s;
}
.chip:hover{
  border-color:var(--green);color:var(--green);
  background:var(--glow2);transform:translateY(-1px);
}

/* ─── Messages ─── */
.msg{
  display:flex;gap:11px;align-items:flex-start;
  animation:msgIn .28s cubic-bezier(.34,1.4,.64,1) both;
}
@keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse}

.av{
  width:30px;height:30px;border-radius:8px;
  display:grid;place-items:center;
  font-family:'DM Mono',monospace;font-size:.55rem;font-weight:500;
  letter-spacing:.06em;flex-shrink:0;
}
.av.ai{
  background:linear-gradient(135deg,rgba(163,230,53,.12),rgba(103,232,249,.08));
  border:1px solid rgba(163,230,53,.22);color:var(--green);
}
.av.user{
  background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(251,113,133,.08));
  border:1px solid rgba(251,191,36,.22);color:var(--amber);
}

.bub{
  max-width:78%;padding:12px 16px;border-radius:12px;
  font-size:.9rem;line-height:1.85;position:relative;
}
.bub.ai{
  background:var(--s1);border:1px solid var(--border);
  border-top-left-radius:3px;color:var(--text);
}
.bub.user{
  background:var(--s2);border:1px solid rgba(251,191,36,.15);
  border-top-right-radius:3px;color:var(--text);
  text-align:right;
}
.bub.ai.typing{
  border-color:rgba(163,230,53,.25);
  box-shadow:0 0 16px rgba(163,230,53,.06);
}

/* typing cursor */
.cursor-blink{
  display:inline-block;width:1.5px;height:.95em;
  background:var(--green);margin-left:1px;vertical-align:text-bottom;
  animation:cb .65s step-end infinite;
}
@keyframes cb{0%,100%{opacity:1}50%{opacity:0}}

/* system message */
.sys{
  text-align:center;
  font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;
  color:var(--dim);padding:4px 0;
  animation:fadeUp .4s ease both;
}
.sys span{
  border:1px solid var(--dim);border-radius:10px;
  padding:2px 10px;
}

/* ─── Model panel (collapsible) ─── */
.model-bar{
  position:relative;z-index:10;
  border-top:1px solid var(--border);
  background:rgba(12,14,11,0.9);
  flex-shrink:0;overflow:hidden;
  transition:max-height .3s ease;
  max-height:0;
}
.model-bar.open{max-height:160px}
.model-inner{
  padding:14px 22px;
  display:flex;gap:20px;align-items:center;flex-wrap:wrap;
}
.ctrl{display:flex;flex-direction:column;gap:6px;min-width:140px}
.ctrl-lbl{
  font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.08em;
  color:var(--mid);display:flex;justify-content:space-between;
}
.ctrl-lbl span{color:var(--green)}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:100%;height:2px;border-radius:2px;
  background:var(--border2);outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:11px;height:11px;border-radius:50%;
  background:var(--green);cursor:pointer;
  box-shadow:0 0 5px rgba(163,230,53,.4);
}
.stats-row{
  display:flex;gap:14px;margin-left:auto;flex-wrap:wrap;
}
.sstat{
  font-family:'DM Mono',monospace;font-size:.6rem;color:var(--mid);
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.sstat b{font-size:.85rem;color:var(--green);font-weight:400}

/* ─── Footer / Input ─── */
footer{
  position:relative;z-index:20;
  border-top:1px solid var(--border);
  background:rgba(12,14,11,0.97);
  backdrop-filter:blur(20px);
  padding:14px 20px;flex-shrink:0;
}
.input-wrap{max-width:740px;margin:0 auto}
.input-row{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--s1);border:1px solid var(--border2);
  border-radius:12px;padding:8px 8px 8px 16px;
  transition:border-color .2s,box-shadow .2s;
}
.input-row:focus-within{
  border-color:rgba(163,230,53,.3);
  box-shadow:0 0 0 3px rgba(163,230,53,.05);
}
textarea{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;
  font-size:.88rem;resize:none;max-height:120px;
  line-height:1.65;padding:2px 0;
}
textarea::placeholder{color:var(--dim)}
.btn-row{display:flex;gap:6px}
.icon-btn{
  width:34px;height:34px;border:1px solid var(--border2);border-radius:8px;
  background:var(--s2);color:var(--mid);cursor:pointer;
  display:grid;place-items:center;flex-shrink:0;
  font-size:.78rem;transition:all .15s;
}
.icon-btn:hover{border-color:var(--green);color:var(--green);background:var(--glow2)}
.send-btn{
  width:34px;height:34px;border:none;border-radius:8px;
  background:var(--green);color:#0c0e0b;cursor:pointer;
  display:grid;place-items:center;flex-shrink:0;
  transition:all .18s;
}
.send-btn:hover{background:var(--green2);box-shadow:0 0 14px rgba(163,230,53,.3);transform:scale(1.05)}
.send-btn:active{transform:scale(.94)}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.send-btn svg{width:14px;height:14px}
.footer-hint{
  text-align:center;margin-top:8px;
  font-family:'DM Mono',monospace;font-size:.56rem;
  color:var(--dim);letter-spacing:.06em;
}

/* progress */
.gen-progress{
  height:1px;background:linear-gradient(90deg,var(--green),var(--cyan));
  width:0%;transition:width .08s linear;
  margin-bottom:1px;
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-orb"></div>
    COMPOSE
  </div>
  <div class="header-right">
    <div class="hbadge warn" id="hbadge">LOADING</div>
    <div class="hstat">
      <div class="dot warn" id="hled"></div>
      <span id="hledtxt">読込中…</span>
    </div>
    <div class="icon-btn" onclick="togglePanel()" title="モデル設定">⚙</div>
  </div>
</header>

<!-- Model settings panel -->
<div class="model-bar" id="modelBar">
  <div class="gen-progress" id="genprog"></div>
  <div class="model-inner">
    <div class="ctrl">
      <div class="ctrl-lbl">N-gram 次数 <span id="vOrder">3</span></div>
      <input type="range" id="rOrder" min="2" max="5" value="3"
        oninput="document.getElementById('vOrder').textContent=this.value;rebuildModel()">
    </div>
    <div class="ctrl">
      <div class="ctrl-lbl">応答長 <span id="vLen">90</span> 文字</div>
      <input type="range" id="rLen" min="20" max="300" value="90" step="10"
        oninput="document.getElementById('vLen').textContent=this.value">
    </div>
    <div class="ctrl">
      <div class="ctrl-lbl">温度（創造性） <span id="vTemp">1.0</span></div>
      <input type="range" id="rTemp" min="0.1" max="3.0" value="1.0" step="0.1"
        oninput="document.getElementById('vTemp').textContent=parseFloat(this.value).toFixed(1)">
    </div>
    <div class="stats-row">
      <div class="sstat"><b id="sChars">—</b>文字数</div>
      <div class="sstat"><b id="sStates">—</b>状態数</div>
      <div class="sstat"><b id="sSents">—</b>文章数</div>
    </div>
  </div>
</div>

<div id="chat">
  <div class="msgs" id="msgs">
    <div class="welcome" id="welcome">
      <div class="welcome-inner">
        <div class="welcome-title">COMPOSE</div>
        <p class="welcome-sub">
          <code>ai.txt</code> を学習した対話型マルコフ連鎖AIです。<br>
          あなたの入力キーワードを起点に文章を生成して返答します。
        </p>
        <div class="chips" id="chips">
          <span style="color:var(--dim);font-size:.78rem">データ読込中…</span>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="input-wrap">
    <div class="input-row">
      <textarea id="inp" placeholder="メッセージを入力…" rows="1"
        oninput="resize(this)" onkeydown="onKey(event)"></textarea>
      <div class="btn-row">
        <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled title="送信">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="footer-hint">ENTER で送信 ／ SHIFT+ENTER で改行 ／ ⚙ でモデル設定</div>
  </div>
</footer>

<script>
// ============================================================
//  マルコフ連鎖 対話エンジン
// ============================================================

let corpus = '';
let model  = {};
let order  = 3;
let sentenceStarts = [];
let busy   = false;

// ── 読み込み ──
async function init() {
  try {
    const r = await fetch('ai.txt');
    if (!r.ok) throw new Error();
    corpus = await r.text();
    setStatus(true);
  } catch {
    corpus = fallbackCorpus();
    setStatus(false);
  }
  buildModel();
  updateStats();
  buildChips();
  document.getElementById('sendBtn').disabled = false;
}

function setStatus(ok) {
  document.getElementById('hbadge').textContent = ok ? 'READY' : 'FALLBACK';
  document.getElementById('hbadge').className   = 'hbadge ' + (ok ? 'ok' : 'warn');
  document.getElementById('hled').className     = 'dot ' + (ok ? '' : 'warn');
  document.getElementById('hledtxt').textContent= ok ? 'ai.txt 読込完了' : 'フォールバックデータ';
}

// ── モデル構築 ──
function buildModel() {
  order = parseInt(document.getElementById('rOrder').value);
  model = {};
  sentenceStarts = [];

  const clean = cleanText(corpus);

  // 文頭収集
  sentenceStarts.push(0);
  for (let i = 0; i < clean.length; i++) {
    if ('。！？'.includes(clean[i]) && i+1 < clean.length)
      sentenceStarts.push(i+1);
  }

  // N-gram
  for (let i = 0; i <= clean.length - order - 1; i++) {
    const key  = clean.slice(i, i+order);
    const next = clean[i+order];
    if (!model[key]) model[key] = {};
    model[key][next] = (model[key][next]||0) + 1;
  }
  // → 確率へ
  for (const key in model) {
    const total = Object.values(model[key]).reduce((a,b)=>a+b,0);
    model[key] = Object.entries(model[key]).map(([ch,c])=>({ch,w:c/total}));
  }
}

function rebuildModel() { buildModel(); updateStats(); }

function cleanText(t) {
  return t.replace(/[#\r\n]+/g,' ').replace(/\s+/g,'　');
}

function updateStats() {
  const clean = cleanText(corpus);
  document.getElementById('sChars').textContent  = fmt(clean.length);
  document.getElementById('sStates').textContent = fmt(Object.keys(model).length);
  document.getElementById('sSents').textContent  = (corpus.match(/[。！？]/g)||[]).length;
}

function fmt(n){ return n>=1000?(n/1000).toFixed(1)+'k':String(n) }

// ── チップ生成 ──
function buildChips() {
  const ideas = ['春の光','夜の街','孤独とは','科学の話','食べ物の香り','旅に出る','音楽について','言葉の力','宇宙の不思議','季節の変わり目'];
  document.getElementById('chips').innerHTML = ideas.map(s=>
    `<button class="chip" onclick="suggest('${s}')">${s}</button>`
  ).join('');
}

// ── 返答生成コア ──
function generateReply(seed) {
  const temp = parseFloat(document.getElementById('rTemp').value);
  const len  = parseInt(document.getElementById('rLen').value);
  const clean = cleanText(corpus);

  // シードのマッチングを探す
  let start = '';
  if (seed && seed.length >= order) {
    // 入力テキストを探す
    const seedClean = cleanText(seed);
    for (let i = 0; i < seedClean.length - order + 1; i++) {
      const k = seedClean.slice(i, i+order);
      if (model[k]) { start = k; break; }
    }
  }
  if (!start) {
    // キーワードの1文字ずつ確認
    const seedClean = cleanText(seed || '');
    for (const ch of seedClean) {
      const found = Object.keys(model).find(k=>k.includes(ch));
      if (found) { start = found; break; }
    }
  }
  if (!start) {
    // 文頭からランダム
    const idx = sentenceStarts[Math.floor(Math.random()*sentenceStarts.length)];
    start = clean.slice(idx, idx+order);
    if (!model[start]) {
      start = Object.keys(model)[Math.floor(Math.random()*Object.keys(model).length)];
    }
  }

  let result = start;
  let cur    = start;

  for (let i = 0; i < len; i++) {
    const candidates = model[cur];
    if (!candidates) break;
    const next = sampleTemp(candidates, temp);
    result += next;
    cur = (cur+next).slice(-order);
    // 文末で自然に終わるよう少し延長後停止
    if (result.length > len * 0.8 && '。！？'.includes(next)) break;
  }

  return result;
}

function sampleTemp(cands, temp) {
  if (temp <= 0.01) return cands.reduce((a,b)=>a.w>b.w?a:b).ch;
  const sc = cands.map(c=>({ch:c.ch, w:Math.pow(c.w, 1/temp)}));
  const sum = sc.reduce((a,b)=>a+b.w,0);
  let r = Math.random()*sum;
  for (const c of sc){ r-=c.w; if(r<=0) return c.ch; }
  return sc[sc.length-1].ch;
}

// ── UI ──
function togglePanel() {
  document.getElementById('modelBar').classList.toggle('open');
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight,120)+'px';
}

function onKey(e) {
  if (e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); }
}

function suggest(text) {
  document.getElementById('inp').value = text;
  sendMsg();
}

async function sendMsg() {
  if (busy) return;
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt) return;

  inp.value=''; inp.style.height='auto';
  busy = true;
  document.getElementById('sendBtn').disabled = true;

  // ウェルカム削除
  const w = document.getElementById('welcome');
  if (w) w.remove();

  // ユーザーバブル
  addBubble(txt, 'user');
  addSys('生成中…');

  // 思考中アニメ
  const prog = document.getElementById('genprog');
  let progVal = 0;
  const progTimer = setInterval(()=>{
    progVal = Math.min(progVal + Math.random()*12, 90);
    prog.style.width = progVal + '%';
  }, 60);

  await sleep(300 + Math.random()*400);

  // 生成
  const reply = generateReply(txt);

  clearInterval(progTimer);
  prog.style.width = '100%';
  removeSys();

  // AIバブル（タイピングアニメ）
  const bub = addBubble('', 'ai');
  bub.classList.add('typing');
  await typeText(bub, reply);
  bub.classList.remove('typing');

  setTimeout(()=>{ prog.style.width='0%'; }, 600);
  busy = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('inp').focus();
}

function addBubble(html, role) {
  const c = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `
    <div class="av ${role}">${role==='ai'?'AI':'YOU'}</div>
    <div class="bub ${role}">${escHtml(html)}</div>
  `;
  c.appendChild(d);
  scrollDown();
  return d.querySelector('.bub');
}

function addSys(text) {
  const c = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'sys'; d.id = 'sys-msg';
  d.innerHTML = `<span>${text}</span>`;
  c.appendChild(d);
  scrollDown();
}

function removeSys() {
  const el = document.getElementById('sys-msg');
  if (el) el.remove();
}

async function typeText(bub, text) {
  let html = '';
  bub.innerHTML = '<span class="cursor-blink"></span>';
  for (let i = 0; i < text.length; i++) {
    html += escHtml(text[i]);
    if (i % 3 === 0) {
      bub.innerHTML = html + '<span class="cursor-blink"></span>';
      scrollDown();
      await sleep(12);
    }
  }
  bub.innerHTML = html;
  scrollDown();
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\n/g,'<br>');
}

function scrollDown() {
  const c = document.getElementById('chat');
  c.scrollTop = c.scrollHeight;
}

function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

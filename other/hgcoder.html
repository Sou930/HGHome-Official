<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HGCoder — Browser IDE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root, [data-theme="light"] {
  --bg:       #f0ede8;
  --surface:  #f8f6f2;
  --surface2: #ece9e3;
  --card:     #ffffff;
  --border:   #e3dfd8;
  --border2:  #cdc8bf;
  --text:     #2d2a26;
  --text-dim: #7a7368;
  --text-muted: #b0a99e;
  --ln-bg:    #f8f6f2;
  --editor-bg:#ffffff;
  --error-line-bg: rgba(201,64,64,.07);
}
[data-theme="dark"] {
  --bg:       #13111a;
  --surface:  #1c1926;
  --surface2: #242131;
  --card:     #1c1926;
  --border:   #2e2a3d;
  --border2:  #3d3856;
  --text:     #e8e4f0;
  --text-dim: #8b85a0;
  --text-muted: #5a5470;
  --ln-bg:    #191622;
  --editor-bg:#13111a;
  --error-line-bg: rgba(201,64,64,.12);
}
:root {
  --accent-py:#4a8fd4; --accent-c:#d4823a; --accent-cpp:#9b6dd4;
  --accent-cs:#3aab6e; --accent-bf:#d45f8a; --accent-zig:#d97f30;
  --accent-apl:#2aab99; --accent-ws:#7a8fa6; --accent-mb:#c95f5f;
  --success:#2a9d5c; --error:#c94040; --run:#3d9e6e; --run-h:#2e8a5c;
  --r-sm:8px; --r-md:12px; --r-lg:16px;
  --sh-sm:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 3px 10px rgba(0,0,0,.09),0 1px 3px rgba(0,0,0,.05);
}

body {
  background:var(--bg); color:var(--text);
  font-family:'Nunito',sans-serif;
  min-height:100vh; display:flex; flex-direction:column;
  overflow:hidden; transition:background .25s,color .25s;
}

/* ══ HEADER ══ */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px; height:52px;
  background:var(--card); border-bottom:1px solid var(--border);
  box-shadow:var(--sh-sm); flex-shrink:0; z-index:100; gap:10px;
}
.header-left { display:flex; align-items:center; gap:10px; }
.header-right { display:flex; align-items:center; gap:8px; }

/* ── back button ── */
.btn-home {
  display:flex; align-items:center; gap:6px;
  padding:5px 13px; border-radius:var(--r-sm);
  border:1.5px solid var(--border);
  background:var(--card); color:var(--text-dim);
  font-family:'Nunito',sans-serif; font-size:12px; font-weight:700;
  cursor:pointer; text-decoration:none;
  transition:all .17s; box-shadow:var(--sh-sm); white-space:nowrap;
}
.btn-home:hover {
  color:var(--text); border-color:var(--border2);
  background:var(--surface2); transform:translateY(-1px); box-shadow:var(--sh-md);
}
.btn-home-arrow { font-size:11px; opacity:.7; }

.header-divider { width:1px; height:20px; background:var(--border); flex-shrink:0; }

.logo { font-size:18px; font-weight:800; color:var(--text); display:flex; align-items:center; gap:9px; }
.logo-icon {
  width:28px; height:28px;
  background:linear-gradient(135deg,#4a8fd4,#3aab6e);
  border-radius:8px; display:flex; align-items:center; justify-content:center;
  font-size:12px; box-shadow:0 2px 8px rgba(74,143,212,.28); flex-shrink:0;
}
.logo-text em { font-style:normal; color:var(--run); }

.header-badge {
  font-size:11px; color:var(--text-muted); font-weight:600;
  background:var(--surface2); padding:3px 10px;
  border-radius:20px; border:1px solid var(--border);
}

.icon-btn {
  width:32px; height:32px; border-radius:var(--r-sm);
  border:1.5px solid var(--border); background:var(--card);
  color:var(--text-dim); cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  transition:all .17s; box-shadow:var(--sh-sm);
}
.icon-btn:hover { color:var(--text); border-color:var(--border2); background:var(--surface2); transform:translateY(-1px); box-shadow:var(--sh-md); }

.font-ctrl { display:flex; align-items:center; gap:4px; }
.font-ctrl span { font-size:11px; font-family:'DM Mono',monospace; color:var(--text-dim); min-width:24px; text-align:center; }

/* ══ LANG TABS ══ */
.lang-tabs {
  display:flex; flex-wrap:wrap; align-items:center; gap:5px;
  padding:8px 16px; background:var(--surface);
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.tabs-label { font-size:10px; font-weight:700; color:var(--text-muted); letter-spacing:.07em; text-transform:uppercase; margin-right:2px; }
.lang-tab {
  display:flex; align-items:center; gap:5px;
  padding:4px 12px; border-radius:20px;
  border:1.5px solid var(--border); cursor:pointer;
  font-family:'DM Mono',monospace; font-size:11.5px; font-weight:500;
  background:var(--card); color:var(--text-dim);
  transition:all .17s; box-shadow:var(--sh-sm); white-space:nowrap; user-select:none;
}
.lang-tab:hover { color:var(--text); border-color:var(--border2); transform:translateY(-1px); box-shadow:var(--sh-md); }
.lang-tab.active { color:#fff; border-color:transparent; box-shadow:var(--sh-md); transform:translateY(-1px); }
.lang-tab.active[data-lang="python"] { background:var(--accent-py); }
.lang-tab.active[data-lang="c"]      { background:var(--accent-c); }
.lang-tab.active[data-lang="cpp"]    { background:var(--accent-cpp); }
.lang-tab.active[data-lang="csharp"] { background:var(--accent-cs); }
.lang-tab.active[data-lang="bf"]     { background:var(--accent-bf); }
.lang-tab.active[data-lang="zig"]    { background:var(--accent-zig); }
.lang-tab.active[data-lang="apl"]    { background:var(--accent-apl); }
.lang-tab.active[data-lang="ws"]     { background:var(--accent-ws); }
.lang-tab.active[data-lang="mb"]     { background:var(--accent-mb); }
.tab-dot { width:5px; height:5px; border-radius:50%; background:currentColor; opacity:.4; flex-shrink:0; transition:opacity .17s; }
.lang-tab.active .tab-dot { opacity:.85; background:rgba(255,255,255,.9); }

/* ══ MAIN ══ */
main { flex:1; display:flex; flex-direction:column; overflow:hidden; padding:10px 12px; gap:10px; }
.panels { flex:1; display:grid; grid-template-columns:1fr 1fr; gap:10px; overflow:hidden; min-height:0; }

.editor-pane, .output-pane {
  display:flex; flex-direction:column;
  background:var(--card); border-radius:var(--r-lg);
  border:1px solid var(--border); box-shadow:var(--sh-md); overflow:hidden;
}
.pane-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px; border-bottom:1px solid var(--border);
  background:var(--surface); flex-shrink:0;
  border-radius:var(--r-lg) var(--r-lg) 0 0;
}
.pane-title { display:flex; align-items:center; gap:6px; font-size:10.5px; font-weight:800; color:var(--text-dim); letter-spacing:.06em; text-transform:uppercase; }
.pane-icon { width:19px; height:19px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:9px; flex-shrink:0; }
.pane-icon.ei { background:rgba(74,143,212,.12); }
.pane-icon.oi { background:rgba(58,171,110,.12); }

.lang-badge { font-family:'DM Mono',monospace; font-size:10px; font-weight:500; padding:2px 8px; border-radius:20px; border:1.5px solid transparent; }
.lang-badge.python { background:rgba(74,143,212,.1);  color:var(--accent-py);  border-color:rgba(74,143,212,.2); }
.lang-badge.c      { background:rgba(212,130,58,.1);  color:var(--accent-c);   border-color:rgba(212,130,58,.2); }
.lang-badge.cpp    { background:rgba(155,109,212,.1); color:var(--accent-cpp); border-color:rgba(155,109,212,.2); }
.lang-badge.csharp { background:rgba(58,171,110,.1);  color:var(--accent-cs);  border-color:rgba(58,171,110,.2); }
.lang-badge.bf     { background:rgba(212,95,138,.1);  color:var(--accent-bf);  border-color:rgba(212,95,138,.2); }
.lang-badge.zig    { background:rgba(217,127,48,.1);  color:var(--accent-zig); border-color:rgba(217,127,48,.2); }
.lang-badge.apl    { background:rgba(42,171,153,.1);  color:var(--accent-apl); border-color:rgba(42,171,153,.2); }
.lang-badge.ws     { background:rgba(122,143,166,.1); color:var(--accent-ws);  border-color:rgba(122,143,166,.2); }
.lang-badge.mb     { background:rgba(201,95,95,.1);   color:var(--accent-mb);  border-color:rgba(201,95,95,.2); }

.editor-wrapper { flex:1; display:flex; overflow:hidden; min-height:0; position:relative; }
.line-numbers {
  padding:13px 10px 13px 12px;
  background:var(--ln-bg); border-right:1px solid var(--border);
  color:var(--text-muted); font-family:'DM Mono',monospace;
  line-height:22px; text-align:right; min-width:38px;
  overflow:hidden; user-select:none; white-space:pre; flex-shrink:0;
  transition:font-size .15s;
}
.editor-err-overlay {
  position:absolute; left:38px; right:0; pointer-events:none; overflow:hidden;
  top:0; font-family:'DM Mono',monospace; line-height:22px;
  padding:13px 16px; white-space:pre; z-index:1;
}
.err-line-marker {
  display:block; width:100%; background:var(--error-line-bg);
  border-left:3px solid var(--error);
  padding-left:4px; color:transparent; margin-left:-4px;
}
#editor {
  flex:1; background:var(--editor-bg); color:var(--text);
  font-family:'DM Mono',monospace; line-height:22px;
  padding:13px 16px; border:none; outline:none; resize:none;
  overflow:auto; tab-size:4; white-space:pre; position:relative; z-index:2;
  transition:font-size .15s,background .25s,color .25s;
  caret-color:var(--accent-py);
}
#editor::selection { background:rgba(74,143,212,.2); }

.stdin-section { border-top:1px solid var(--border); background:var(--surface); flex-shrink:0; }
.stdin-header {
  display:flex; align-items:center; gap:7px; padding:6px 12px;
  cursor:pointer; user-select:none; transition:background .15s;
  border-radius:0 0 var(--r-lg) var(--r-lg);
}
.stdin-section.open .stdin-header { border-radius:0; border-bottom:1px solid var(--border); }
.stdin-header:hover { background:var(--surface2); }
.stdin-icon { width:17px; height:17px; background:rgba(122,143,166,.14); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:9px; flex-shrink:0; color:var(--text-dim); }
.stdin-label { font-size:10px; font-weight:700; letter-spacing:.05em; color:var(--text-dim); text-transform:uppercase; flex:1; }
.stdin-chevron { color:var(--text-muted); font-size:10px; transition:transform .2s ease; line-height:1; }
.stdin-section.open .stdin-chevron { transform:rotate(180deg); }
#stdin {
  display:none; width:100%;
  background:var(--editor-bg); color:var(--text);
  font-family:'DM Mono',monospace; font-size:12.5px; line-height:20px;
  padding:9px 14px; border:none; outline:none; resize:none; height:64px;
  transition:background .25s,color .25s;
}
.stdin-section.open #stdin { display:block; }

#output {
  flex:1; font-family:'DM Mono',monospace; line-height:21px;
  padding:13px 14px; overflow:auto; white-space:pre-wrap;
  word-break:break-word; color:var(--text); min-height:0;
  transition:background .25s,color .25s;
}
#output .line-stdout  { color:var(--text); }
#output .line-stderr  { color:var(--error); }
#output .line-info    { color:var(--text-muted); font-style:italic; }
#output .line-success { color:var(--success); font-weight:700; }

.output-footer {
  display:flex; align-items:center; gap:7px;
  padding:7px 12px; border-top:1px solid var(--border);
  background:var(--surface); flex-shrink:0;
  border-radius:0 0 var(--r-lg) var(--r-lg); flex-wrap:wrap;
}
.meta-chip {
  display:flex; align-items:center; gap:4px;
  font-size:10.5px; font-family:'DM Mono',monospace;
  color:var(--text-dim); background:var(--surface2);
  border:1px solid var(--border); padding:2px 8px; border-radius:20px;
}
.status-dot { width:6px; height:6px; border-radius:50%; background:var(--text-muted); transition:background .2s,box-shadow .2s; flex-shrink:0; }
.status-dot.ok  { background:var(--success); box-shadow:0 0 5px rgba(42,157,92,.45); }
.status-dot.err { background:var(--error);   box-shadow:0 0 5px rgba(201,64,64,.45); }
.status-dot.run { background:var(--accent-py); box-shadow:0 0 5px rgba(74,143,212,.55); animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.25} }

.copy-btn {
  margin-left:auto; padding:2px 8px; font-size:10.5px; font-family:'Nunito',sans-serif; font-weight:700;
  background:transparent; color:var(--text-dim); border:1.5px solid var(--border);
  border-radius:6px; cursor:pointer; transition:all .15s;
}
.copy-btn:hover { color:var(--text); border-color:var(--border2); background:var(--surface2); }
.copy-btn.copied { color:var(--success); border-color:rgba(42,157,92,.3); }

.toolbar { display:flex; align-items:center; gap:7px; flex-shrink:0; }
.btn-run {
  display:flex; align-items:center; gap:7px; padding:8px 20px;
  background:var(--run); color:#fff; border:none; border-radius:var(--r-md);
  font-family:'Nunito',sans-serif; font-size:14px; font-weight:800;
  cursor:pointer; transition:all .18s; box-shadow:0 2px 8px rgba(61,158,110,.32);
}
.btn-run:hover:not(:disabled) { background:var(--run-h); box-shadow:0 4px 16px rgba(61,158,110,.42); transform:translateY(-1px); }
.btn-run:active:not(:disabled) { transform:translateY(0); }
.btn-run:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.btn-cancel {
  padding:8px 14px; background:transparent; color:var(--error);
  border:1.5px solid rgba(201,64,64,.3); border-radius:var(--r-sm);
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; transition:all .17s; display:none;
}
.btn-cancel.visible { display:block; }
.btn-cancel:hover { background:rgba(201,64,64,.08); border-color:var(--error); }
.btn-sec {
  padding:7px 13px; background:var(--card); color:var(--text-dim);
  border:1.5px solid var(--border); border-radius:var(--r-sm);
  font-family:'Nunito',sans-serif; font-size:12.5px; font-weight:700;
  cursor:pointer; transition:all .17s; box-shadow:var(--sh-sm);
}
.btn-sec:hover { color:var(--text); border-color:var(--border2); background:var(--surface2); transform:translateY(-1px); box-shadow:var(--sh-md); }
.btn-sec.danger:hover { color:var(--error); border-color:rgba(201,64,64,.3); background:rgba(201,64,64,.06); }
.toolbar-spacer { flex:1; }
.shortcut-hint { font-size:11px; color:var(--text-muted); font-family:'DM Mono',monospace; display:flex; align-items:center; gap:4px; }
kbd { background:var(--surface2); border:1px solid var(--border2); border-radius:4px; padding:1px 5px; font-size:9.5px; font-family:'DM Mono',monospace; box-shadow:0 1px 0 var(--border2); }

.spinner { width:13px; height:13px; border:2.5px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .55s linear infinite; display:none; flex-shrink:0; }
.btn-run.loading .spinner { display:block; }
.btn-run.loading .run-icon { display:none; }
@keyframes spin { to{transform:rotate(360deg)} }

.modal-backdrop {
  position:fixed; inset:0; background:rgba(0,0,0,.35); backdrop-filter:blur(4px);
  z-index:1000; display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-backdrop.open { display:flex; }
.modal {
  background:var(--card); border-radius:var(--r-lg); border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,.2); width:100%; max-width:580px;
  max-height:80vh; display:flex; flex-direction:column; overflow:hidden;
}
.modal-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.modal-title { font-size:15px; font-weight:800; color:var(--text); }
.modal-close { background:none; border:none; font-size:18px; cursor:pointer; color:var(--text-dim); padding:2px 6px; border-radius:6px; transition:all .15s; }
.modal-close:hover { background:var(--surface2); color:var(--text); }
.modal-body { overflow-y:auto; padding:16px 18px; }
.cheat-lang { margin-bottom:18px; }
.cheat-lang-name { font-size:12px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:var(--text-dim); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.cheat-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.cheat-table { width:100%; border-collapse:collapse; }
.cheat-table td { padding:5px 8px; font-size:12px; border-bottom:1px solid var(--border); vertical-align:top; }
.cheat-table td:first-child { font-family:'DM Mono',monospace; font-size:11.5px; color:var(--accent-py); white-space:nowrap; width:40%; }
.cheat-table tr:last-child td { border-bottom:none; }

.history-panel {
  position:fixed; right:0; top:0; bottom:0; width:300px;
  background:var(--card); border-left:1px solid var(--border);
  box-shadow:-4px 0 20px rgba(0,0,0,.1); z-index:200;
  display:flex; flex-direction:column;
  transform:translateX(100%); transition:transform .25s ease;
}
.history-panel.open { transform:translateX(0); }
.history-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
.history-title { font-size:13px; font-weight:800; color:var(--text); }
.history-list { flex:1; overflow-y:auto; padding:8px; }
.history-item {
  padding:10px 12px; border-radius:var(--r-sm); border:1px solid var(--border);
  margin-bottom:6px; cursor:pointer; transition:all .15s; background:var(--surface);
}
.history-item:hover { border-color:var(--border2); background:var(--surface2); transform:translateX(-2px); }
.history-item-meta { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.history-item-lang { font-size:10px; font-family:'DM Mono',monospace; color:#fff; padding:1px 6px; border-radius:10px; }
.history-item-time { font-size:10px; color:var(--text-muted); }
.history-item-preview { font-size:11px; font-family:'DM Mono',monospace; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.history-empty { text-align:center; padding:40px 16px; color:var(--text-muted); font-size:13px; }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:99px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }

@media(max-width:768px){
  .panels{grid-template-columns:1fr;grid-template-rows:1fr 1fr;}
  .history-panel{width:100%;}
  .btn-home-label{display:none;}
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="../index.html" class="btn-home">
      <span class="btn-home-arrow">←</span>
      <span class="btn-home-label">HGHome へ戻る</span>
    </a>
    <div class="header-divider"></div>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">HG<em>Coder</em></span>
    </div>
  </div>
  <div class="header-right">
    <div class="font-ctrl">
      <button class="icon-btn" id="fontDec" title="文字を小さく">A-</button>
      <span id="fontSizeLabel">13</span>
      <button class="icon-btn" id="fontInc" title="文字を大きく">A+</button>
    </div>
    <button class="icon-btn" id="historyBtn" title="実行履歴">🕐</button>
    <button class="icon-btn" id="cheatBtn" title="チートシート">?</button>
    <button class="icon-btn" id="themeBtn" title="テーマ切替">🌙</button>
    <div class="header-badge">ブラウザ内実行</div>
  </div>
</header>

<div class="lang-tabs">
  <span class="tabs-label">言語</span>
  <button class="lang-tab active" data-lang="python"><span class="tab-dot"></span>Python</button>
  <button class="lang-tab" data-lang="c"><span class="tab-dot"></span>C</button>
  <button class="lang-tab" data-lang="cpp"><span class="tab-dot"></span>C++</button>
  <button class="lang-tab" data-lang="csharp"><span class="tab-dot"></span>C#</button>
  <button class="lang-tab" data-lang="zig"><span class="tab-dot"></span>Zig</button>
  <button class="lang-tab" data-lang="apl"><span class="tab-dot"></span>APL</button>
  <button class="lang-tab" data-lang="ws"><span class="tab-dot"></span>Whitespace</button>
  <button class="lang-tab" data-lang="mb"><span class="tab-dot"></span>Malbolge</button>
  <button class="lang-tab" data-lang="bf"><span class="tab-dot"></span>BrainFuck</button>
</div>

<main>
  <div class="panels">
    <div class="editor-pane">
      <div class="pane-header">
        <div class="pane-title"><div class="pane-icon ei">✏️</div>エディタ</div>
        <span class="lang-badge python" id="langBadge">python</span>

let currentLang='python',currentFontSize=13,abortController=null,runHistory=[];
const STORE_KEY='hgcoder_code_',LS_FONT_KEY='hgcoder_font',LS_THEME_KEY='hgcoder_theme';
const editor=document.getElementById('editor'),outputEl=document.getElementById('output'),lineNumbers=document.getElementById('lineNumbers'),langBadge=document.getElementById('langBadge'),btnRun=document.getElementById('btnRun'),btnCancel=document.getElementById('btnCancel'),statusDot=document.getElementById('statusDot'),statusText=document.getElementById('statusText'),timeInfo=document.getElementById('timeInfo'),exitInfo=document.getElementById('exitInfo'),stdinEl=document.getElementById('stdin'),errOverlay=document.getElementById('errOverlay');

(function init(){
  const t=localStorage.getItem(LS_THEME_KEY)||'light';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙';
  setFontSize(parseInt(localStorage.getItem(LS_FONT_KEY))||13,false);
  const saved=localStorage.getItem(STORE_KEY+currentLang);
  editor.value=saved!==null?saved:DEFAULTS[currentLang];

})();

function setFontSize(size,save=true){currentFontSize=Math.min(20,Math.max(10,size));editor.style.fontSize=currentFontSize+'px';lineNumbers.style.fontSize=currentFontSize+'px';editor.style.lineHeight=(currentFontSize+9)+'px';lineNumbers.style.lineHeight=(currentFontSize+9)+'px';document.getElementById('fontSizeLabel').textContent=currentFontSize;if(save)localStorage.setItem(LS_FONT_KEY,currentFontSize);updateLineNumbers();}
document.getElementById('fontInc').onclick=()=>setFontSize(currentFontSize+1);
document.getElementById('fontDec').onclick=()=>setFontSize(currentFontSize-1);
document.getElementById('themeBtn').onclick=()=>{const c=document.documentElement.getAttribute('data-theme');const n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);document.getElementById('themeBtn').textContent=n==='dark'?'☀️':'🌙';localStorage.setItem(LS_THEME_KEY,n);};

function updateLineNumbers(){const l=editor.value.split('\n').length;lineNumbers.textContent=Array.from({length:l},(_,i)=>i+1).join('\n');lineNumbers.scrollTop=editor.scrollTop;}
editor.addEventListener('input',()=>{updateLineNumbers();localStorage.setItem(STORE_KEY+currentLang,editor.value);});
editor.addEventListener('scroll',()=>{lineNumbers.scrollTop=editor.scrollTop;});

editor.addEventListener('keydown',e=>{
  const s=editor.selectionStart,end=editor.selectionEnd,v=editor.value;
  if(e.key==='Tab'){e.preventDefault();editor.value=v.substring(0,s)+'    '+v.substring(end);editor.selectionStart=editor.selectionEnd=s+4;updateLineNumbers();return;}
  if(e.key==='Enter'){e.preventDefault();const ls=v.lastIndexOf('\n',s-1)+1;const cl=v.substring(ls,s);const indent=cl.match(/^(\s*)/)[1];const extra=/[{(\[]$/.test(cl.trimEnd())?'    ':'';const ins='\n'+indent+extra;editor.value=v.substring(0,s)+ins+v.substring(end);editor.selectionStart=editor.selectionEnd=s+ins.length;updateLineNumbers();localStorage.setItem(STORE_KEY+currentLang,editor.value);return;}
  const pairs={'(':')','{':'}','[':']','"':'"',"'":"'"};
  if(pairs[e.key]&&end===s){e.preventDefault();editor.value=v.substring(0,s)+e.key+pairs[e.key]+v.substring(end);editor.selectionStart=editor.selectionEnd=s+1;return;}
  if(')}]'.includes(e.key)&&v[s]===e.key){e.preventDefault();editor.selectionStart=editor.selectionEnd=s+1;return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runCode();}
});

document.querySelectorAll('.lang-tab').forEach(tab=>{

    langBadge.className='lang-badge '+currentLang;langBadge.textContent=currentLang;
    const saved=localStorage.getItem(STORE_KEY+currentLang);

});

function appendOutput(text,cls){const lines=String(text).split('\n');lines.forEach((line,i)=>{if(i<lines.length-1||line){const span=document.createElement('span');span.className=cls;span.textContent=line+(i<lines.length-1?'\n':'');outputEl.appendChild(span);}});outputEl.scrollTop=outputEl.scrollHeight;}
function clearOutput(){outputEl.innerHTML='<span class="line-info">▶  実行ボタンを押すか Ctrl+Enter でコードを実行します</span>';setStatus('idle');timeInfo.textContent='⏱ —';exitInfo.textContent='exit —';}
function resetCode(){if(!confirm('コードをデフォルトに戻しますか？'))return;editor.value=DEFAULTS[currentLang];localStorage.setItem(STORE_KEY+currentLang,editor.value);updateLineNumbers();clearErrOverlay();}
function setStatus(s,msg){statusDot.className='status-dot '+(s==='ok'?'ok':s==='err'?'err':s==='run'?'run':'');statusText.textContent=msg||(s==='ok'?'正常終了':s==='err'?'エラー':s==='run'?'実行中...':'待機中');}
function setLoading(v){btnRun.disabled=v;btnRun.classList.toggle('loading',v);btnCancel.classList.toggle('visible',v);}
function clearErrOverlay(){errOverlay.innerHTML='';}
function highlightErrorLines(stderr){clearErrOverlay();if(!stderr)return;const lineNums=new Set();const patterns=[/:(\d+):/g,/line (\d+)/gi,/\((\d+),/g];for(const pat of patterns){let m;while((m=pat.exec(stderr))!==null){const n=parseInt(m[1]);if(n>0)lineNums.add(n);}}if(!lineNums.size)return;const lh=currentFontSize+9;const lines=editor.value.split('\n');let html='';for(let i=0;i<lines.length;i++){if(lineNums.has(i+1)){html+=`<span class="err-line-marker" style="height:${lh}px;line-height:${lh}px;">${' '.repeat(Math.max(0,lines[i].length)||1)}</span>\n`;}else{html+='\n';}}errOverlay.style.lineHeight=lh+'px';errOverlay.style.fontSize=currentFontSize+'px';errOverlay.innerHTML=html;errOverlay.scrollTop=editor.scrollTop;}

document.getElementById('copyBtn').onclick=function(){const text=outputEl.textContent;if(!text.trim())return;navigator.clipboard.writeText(text).then(()=>{this.textContent='✓ コピー完了';this.classList.add('copied');setTimeout(()=>{this.textContent='📋 コピー';this.classList.remove('copied');},2000);});};
function cancelRun(){if(abortController){abortController.abort();abortController=null;}setLoading(false);appendOutput('\n⚠ 実行を中断しました','line-info');setStatus('idle','中断');}

const ACCENT_COLORS={python:'#4a8fd4',c:'#d4823a',cpp:'#9b6dd4',csharp:'#3aab6e',bf:'#d45f8a',zig:'#d97f30',apl:'#2aab99',ws:'#7a8fa6',mb:'#c95f5f'};
function addHistory(lang,code,result,elapsed){runHistory.unshift({lang,code:code.trim().substring(0,200),result,elapsed,time:new Date()});if(runHistory.length>15)runHistory.pop();renderHistory();}

function runPython(code,stdinData){return new Promise(resolve=>{let outBuf='';const stdinLines=stdinData.split('\n');let stdinIdx=0;Sk.configure({output:txt=>{outBuf+=txt;},read:x=>{if(Sk.builtinFiles===undefined||Sk.builtinFiles.files[x]===undefined)throw"File not found: '"+x+"'";return Sk.builtinFiles.files[x];},inputfun:()=>new Promise(res=>{const line=stdinLines[stdinIdx++]||'';outBuf+=line+'\n';res(line);}),inputfunTakesPrompt:true,});Sk.misceval.asyncToPromise(()=>Sk.importMainWithBody('<stdin>',false,code,true)).then(()=>resolve({stdout:outBuf,stderr:'',exit:0})).catch(e=>resolve({stdout:outBuf,stderr:e.toString(),exit:1}));});}

async function runWandbox(lang,code,stdinData,signal){const configs={c:{compiler:'gcc-head',options:'warning,c11',raw:'-std=c11 -lm'},cpp:{compiler:'gcc-head',options:'warning,gnu++17',raw:'-std=c++17 -lm'},csharp:{compiler:'dotnet-head',options:'',raw:''},zig:{compiler:'zig-head',options:'',raw:''}};const cfg=configs[lang];const body={compiler:cfg.compiler,code,stdin:stdinData,options:cfg.options,'compiler-option-raw':cfg.raw,'runtime-option-raw':'',save:false};const resp=await fetch('https://wandbox.org/api/compile.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal});if(!resp.ok)throw new Error(`Wandbox HTTP ${resp.status}`);const data=await resp.json();return{stdout:data.program_output||'',stderr:(data.compiler_error||'')+(data.program_error||''),exit:data.status||0};}

function runBrainFuck(code,stdinData){return new Promise(resolve=>{const ops=code.replace(/[^><+\-.,\[\]]/g,'');const tape=new Uint8Array(30000);let dp=0,ip=0,si=0;const stdinBytes=[...stdinData].map(c=>c.charCodeAt(0));stdinBytes.push(0);let out='';const MAX=10_000_000;let steps=0;const jt={};const stack=[];for(let i=0;i<ops.length;i++){if(ops[i]==='[')stack.push(i);else if(ops[i]===']'){if(!stack.length){resolve({stdout:out,stderr:`BrainFuck: 位置 ${i} に対応する [ がありません`,exit:1});return;}const j=stack.pop();jt[i]=j;jt[j]=i;}}if(stack.length){resolve({stdout:out,stderr:`BrainFuck: 位置 ${stack[0]} に対応する ] がありません`,exit:1});return;}while(ip<ops.length){if(++steps>MAX){resolve({stdout:out,stderr:`BrainFuck: ステップ上限超過（無限ループ？）`,exit:1});return;}switch(ops[ip]){case'>':dp=(dp+1)%30000;break;case'<':dp=(dp+29999)%30000;break;case'+':tape[dp]=(tape[dp]+1)&0xff;break;case'-':tape[dp]=(tape[dp]+255)&0xff;break;case'.':out+=String.fromCharCode(tape[dp]);break;case',':tape[dp]=stdinBytes[si]??0;si=Math.min(si+1,stdinBytes.length-1);break;case'[':if(tape[dp]===0)ip=jt[ip];break;case']':if(tape[dp]!==0)ip=jt[ip];break;}ip++;}resolve({stdout:out,stderr:'',exit:0});});}

let aplLoaded=false;
async function runAPL(code,stdinData){if(!aplLoaded){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/ngn-apl@0.0.4/apl.js';s.onload=()=>{aplLoaded=true;res();};s.onerror=()=>rej(new Error('APL エンジンの読み込みに失敗しました'));document.head.appendChild(s);});}return new Promise(resolve=>{let out='';try{const fn=window.APL||window.apl;if(!fn)throw new Error('APL エンジンが見つかりません');const lines=code.split('\n').filter(l=>l.trim()&&!l.trim().startsWith('⍝'));for(const line of lines){try{const r=fn(line.trim());if(r!==undefined&&r!==null&&r!=='')out+=String(r)+'\n';}catch(e){out+=`エラー [${line.trim()}]: ${e.message||e}\n`;}}resolve({stdout:out,stderr:'',exit:0});}catch(e){resolve({stdout:out,stderr:e.message||String(e),exit:1});}});}

function runWhitespace(code,stdinData){return new Promise(resolve=>{const tokens=[...code].filter(c=>c===' '||c==='\t'||c==='\n');const S=' ',T='\t',L='\n';const stdinChars=[...stdinData];let si=0;function parseNum(pos){if(pos>=tokens.length)return{val:0,pos};const sign=tokens[pos]===T?-1:1;pos++;let bits='';while(pos<tokens.length&&tokens[pos]!==L){bits+=tokens[pos]===T?'1':'0';pos++;}pos++;return{val:sign*(bits?parseInt(bits,2):0),pos};}function parseLabel(pos){let lbl='';while(pos<tokens.length&&tokens[pos]!==L){lbl+=tokens[pos]===T?'1':'0';pos++;}pos++;return{lbl,pos};}const instrs=[];const labelMap={};let p=0;while(p<tokens.length){const t0=tokens[p];if(!t0)break;const t1=tokens[p+1],t2=tokens[p+2];if(t0===S){if(t1===S){const r=parseNum(p+2);instrs.push({op:'push',val:r.val});p=r.pos;}else if(t1===L&&t2===S){instrs.push({op:'dup'});p+=3;}else if(t1===T&&t2===S){const r=parseNum(p+3);instrs.push({op:'copy',val:r.val});p=r.pos;}else if(t1===L&&t2===T){instrs.push({op:'swap'});p+=3;}else if(t1===L&&t2===L){instrs.push({op:'discard'});p+=3;}else if(t1===T&&t2===L){const r=parseNum(p+3);instrs.push({op:'slide',val:r.val});p=r.pos;}else p++;}else if(t0===T&&t1===S){if(t2===S){const t3=tokens[p+3];if(t3===S)instrs.push({op:'add'});else if(t3===T)instrs.push({op:'sub'});else if(t3===L)instrs.push({op:'mul'});else{p++;continue;}p+=4;}else if(t2===T){const t3=tokens[p+3];if(t3===S)instrs.push({op:'div'});else if(t3===T)instrs.push({op:'mod'});else{p++;continue;}p+=4;}else p++;}else if(t0===T&&t1===T){if(t2===S){instrs.push({op:'store'});p+=3;}else if(t2===T){instrs.push({op:'retrieve'});p+=3;}else p++;}else if(t0===L){if(t1===S&&t2===S){const r=parseLabel(p+3);labelMap[r.lbl]=instrs.length;instrs.push({op:'label',lbl:r.lbl});p=r.pos;}else if(t1===S&&t2===T){const r=parseLabel(p+3);instrs.push({op:'call',lbl:r.lbl});p=r.pos;}else if(t1===S&&t2===L){const r=parseLabel(p+3);instrs.push({op:'jmp',lbl:r.lbl});p=r.pos;}else if(t1===T&&t2===S){const r=parseLabel(p+3);instrs.push({op:'jz',lbl:r.lbl});p=r.pos;}else if(t1===T&&t2===T){const r=parseLabel(p+3);instrs.push({op:'jn',lbl:r.lbl});p=r.pos;}else if(t1===T&&t2===L){instrs.push({op:'ret'});p+=3;}else if(t1===L&&t2===L){instrs.push({op:'end'});p+=3;}else p++;}else if(t0===T&&t1===L){if(t2===S){const t3=tokens[p+3];if(t3===S)instrs.push({op:'printc'});else if(t3===T)instrs.push({op:'printi'});else{p++;continue;}p+=4;}else if(t2===T){const t3=tokens[p+3];if(t3===S)instrs.push({op:'readc'});else if(t3===T)instrs.push({op:'readi'});else{p++;continue;}p+=4;}else p++;}else p++;}const stack=[];const heap={};const callStack=[];let ip=0;let out='';const MAX=1_000_000;let steps=0;const top=()=>stack[stack.length-1];const pop=()=>stack.pop();const push=v=>stack.push(v);try{while(ip<instrs.length){if(++steps>MAX)throw new Error(`ステップ上限超過`);const ins=instrs[ip++];switch(ins.op){case'push':push(ins.val);break;case'dup':push(top());break;case'copy':push(stack[stack.length-1-ins.val]??0);break;case'swap':{const a=pop(),b=pop();push(a);push(b);}break;case'discard':pop();break;case'slide':{const t=pop();stack.splice(stack.length-ins.val,ins.val);push(t);}break;case'add':{const b=pop(),a=pop();push(a+b);}break;case'sub':{const b=pop(),a=pop();push(a-b);}break;case'mul':{const b=pop(),a=pop();push(a*b);}break;case'div':{const b=pop(),a=pop();if(b===0)throw new Error('0除算');push(Math.trunc(a/b));}break;case'mod':{const b=pop(),a=pop();if(b===0)throw new Error('0除算');push(((a%b)+b)%b);}break;case'store':{const v=pop(),addr=pop();heap[addr]=v;}break;case'retrieve':{const addr=pop();push(heap[addr]??0);}break;case'label':break;case'call':callStack.push(ip);ip=labelMap[ins.lbl]??ip;break;case'jmp':ip=labelMap[ins.lbl]??ip;break;case'jz':{const v=pop();if(v===0)ip=labelMap[ins.lbl]??ip;}break;case'jn':{const v=pop();if(v<0)ip=labelMap[ins.lbl]??ip;}break;case'ret':ip=callStack.pop()??instrs.length;break;case'end':ip=instrs.length;break;case'printc':out+=String.fromCharCode(pop());break;case'printi':out+=String(pop());break;case'readc':{const addr=pop();const ch=stdinChars[si++]||'\0';heap[addr]=ch.charCodeAt(0);}break;case'readi':{const addr=pop();const line=(stdinData.split('\n')[si++]||'0').trim();heap[addr]=parseInt(line)||0;}break;}}resolve({stdout:out,stderr:'',exit:0});}catch(e){resolve({stdout:out,stderr:`Whitespace エラー: ${e.message}`,exit:1});}});}

function runMalbolge(code,stdinData){return new Promise(resolve=>{const mem=new Array(59049).fill(0);let a=0,c=0,d=0,si=0,out='';const stdinBytes=[...stdinData].map(ch=>ch.charCodeAt(0));const CRAZY=[[4,3,3,1,0,0,1,0,0],[8,9,8,7,8,7,4,3,4],[6,6,9,5,5,9,5,5,9],[5,3,5,8,6,5,8,6,5],[7,8,7,3,8,3,3,8,3],[0,1,0,7,8,7,4,5,4],[7,0,7,8,3,8,7,0,7],[8,3,8,7,6,7,8,3,8],[0,1,0,7,8,7,4,5,4]];function crazy(a,b){let r=0,base=1;for(let i=0;i<10;i++){r+=CRAZY[Math.floor(a/base)%3][Math.floor(b/base)%3]*base;base*=3;}return r;}function rot(x){return Math.floor(x/3)+((x%3)*19683);}const VALID=new Set([4,5,23,39,40,62,68,81]);let mp=0;for(const line of code.split('\n')){if(line.trim().startsWith('#'))continue;for(const ch of line){const cc=ch.charCodeAt(0);if(cc===9||cc===32||cc===13)continue;if(cc<33||cc>126){resolve({stdout:'',stderr:`Malbolge: 無効な文字 '${ch}' (pos ${mp})`,exit:1});return;}if(!VALID.has((cc-33+mp)%94)){resolve({stdout:'',stderr:`Malbolge: 位置 ${mp} の文字 '${ch}' は不正です\nサンプルコードをリセットして試してください`,exit:1});return;}mem[mp++]=cc;if(mp>=59049)break;}}for(let i=mp;i<59049;i++)mem[i]=crazy(mem[i-1],mem[i-2]);const MAX=5_000_000;let steps=0;try{while(true){if(++steps>MAX)throw new Error(`ステップ上限超過`);const ins=(mem[c]-33+c)%94;switch(ins){case 4:{const tmp=mem[d]%59049;c=tmp-1;d=(d+1)%59049;}break;case 5:out+=String.fromCharCode(a);break;case 23:a=stdinBytes[si++]??10;break;case 39:a=rot(mem[d]);mem[d]=a;break;case 40:d=mem[d]%59049;break;case 62:a=crazy(a,mem[d]);mem[d]=a;break;case 68:break;case 81:resolve({stdout:out,stderr:'',exit:0});return;}mem[c]=((mem[c]-33+1)%94)+33;c=(c+1)%59049;d=(d+1)%59049;}}catch(e){resolve({stdout:out,stderr:`Malbolge エラー: ${e.message}`,exit:1});}});}

async function runCode(){const code=editor.value.trim();const stdin=stdinEl.value;if(!code)return;abortController=new AbortController();setLoading(true);outputEl.innerHTML='';setStatus('run','実行中...');clearErrOverlay();const t0=performance.now();appendOutput(`$ run (${currentLang})\n`,'line-info');let result;try{if(currentLang==='python')result=await runPython(code,stdin);else if(currentLang==='bf')result=await runBrainFuck(code,stdin);else if(currentLang==='ws')result=await runWhitespace(code,stdin);else if(currentLang==='mb')result=await runMalbolge(code,stdin);else if(currentLang==='apl')result=await runAPL(code,stdin);else{try{result=await runWandbox(currentLang,code,stdin,abortController.signal);}catch(netErr){if(netErr.name==='AbortError')return;result={stdout:'',stderr:`ネットワークエラー: Wandbox API に接続できませんでした。\n詳細: ${netErr.message}`,exit:1};}}}catch(e){result={stdout:'',stderr:e.message||String(e),exit:1};}const elapsed=((performance.now()-t0)/1000).toFixed(3);if(result.stdout)appendOutput(result.stdout,'line-stdout');if(result.stderr){appendOutput(result.stderr,'line-stderr');highlightErrorLines(result.stderr);}const ok=result.exit===0||result.exit==='0';if(ok&&!result.stderr)appendOutput(`\n✓ 正常終了 (${elapsed}s)`,'line-success');else if(!ok)appendOutput(`\n✗ 終了コード: ${result.exit} (${elapsed}s)`,'line-stderr');setStatus(ok&&!result.stderr?'ok':'err');timeInfo.textContent=`⏱ ${elapsed}s`;exitInfo.textContent=`exit ${result.exit??0}`;addHistory(currentLang,editor.value,result,elapsed);abortController=null;setLoading(false);}
